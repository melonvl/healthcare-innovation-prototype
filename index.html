<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simply Healthcare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; color: #1a2a3a; }
    #app { padding: 2rem 1rem; max-width: 740px; margin: 0 auto; }

    .header { margin-bottom: 1.75rem; text-align: center; }
    .header h1 { font-size: 28px; font-weight: 700; color: #1a5276; margin-bottom: 6px; letter-spacing: -0.5px; }
    .header p { font-size: 15px; color: #5d7a8a; }

    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #9ab; pointer-events: none; }
    #search {
      width: 100%; font-size: 15px; padding: 12px 16px 12px 40px;
      border: 1.5px solid #cddbe8; border-radius: 14px;
      background: #fff; color: #1a2a3a; outline: none;
      box-shadow: 0 2px 8px rgba(26,82,118,0.06);
    }
    #search:focus { border-color: #2e86c1; box-shadow: 0 0 0 3px rgba(46,134,193,0.15); }

    .result-count { font-size: 12px; color: #aab; margin-top: 8px; padding-left: 2px; }
    #results { margin-top: 1rem; display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: #fff; border: 1.5px solid #dce8f0;
      border-radius: 16px; padding: 1.1rem 1.4rem;
      cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(26,82,118,0.05);
    }
    .card:hover { border-color: #2e86c1; box-shadow: 0 4px 16px rgba(46,134,193,0.1); }

    .card-name { font-size: 16px; font-weight: 700; color: #1a5276; }
    .card-plain { font-size: 14px; color: #4a6070; margin-top: 6px; line-height: 1.65; }
    .expand-hint { font-size: 12px; color: #2e86c1; margin-top: 9px; font-weight: 500; }

    .card-detail { margin-top: 16px; border-top: 1.5px solid #eaf1f8; padding-top: 16px; display: none; flex-direction: column; gap: 12px; }
    .card-detail.open { display: flex; }

    .detail-row { display: flex; gap: 10px; }
    .detail-label { font-size: 12px; color: #8aabb8; min-width: 110px; padding-top: 2px; flex-shrink: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .detail-val { font-size: 13px; color: #2a3a4a; line-height: 1.6; }

    /* Reassurance band */
    .reassure-band { background: #eaf4fb; border-radius: 10px; padding: 12px 14px; margin-bottom: 4px; }
    .reassure-band p { font-size: 13px; color: #1a5276; line-height: 1.6; }
    .reassure-band strong { font-weight: 700; }

    /* Risk section */
    .risk-section { border-top: 1.5px solid #eaf1f8; padding-top: 16px; margin-top: 4px; }
    .risk-section-title { font-size: 15px; font-weight: 700; color: #1a5276; margin-bottom: 3px; }
    .risk-section-sub { font-size: 12px; color: #8aabb8; margin-bottom: 16px; }

    /* Icon grid — positive framing (shows safe majority) */
    .icon-block { margin-bottom: 18px; }
    .icon-block-label { font-size: 13px; color: #2a3a4a; margin-bottom: 10px; line-height: 1.6; }
    .icon-grid { display: grid; grid-template-columns: repeat(10, 16px); gap: 4px; }
    .icon-person {
      width: 16px; height: 20px; border-radius: 5px 5px 3px 3px;
      background: #d4eaf7;
    }
    .icon-person.safe { background: #2e86c1; }
    .icon-person.affected { background: #e8ae6a; }

    .icon-legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
    .icon-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #5d7a8a; }
    .icon-legend-box { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* Outcome bars */
    .outcome-bars { display: flex; flex-direction: column; gap: 16px; margin-top: 4px; }
    .outcome-title { font-size: 13px; font-weight: 700; color: #1a5276; margin-bottom: 16px; }

    .outcome-item {}
    .outcome-item-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .outcome-item-label { font-size: 13px; color: #2a3a4a; font-weight: 500; }
    .outcome-pct-wrap { display: flex; gap: 8px; align-items: baseline; }
    .outcome-pct-safe { font-size: 14px; font-weight: 700; color: #1a7a4a; }
    .outcome-pct-risk { font-size: 11px; color: #9aabb8; }

    .dual-bar-track { height: 10px; background: #ececec; border-radius: 6px; overflow: hidden; display: flex; margin-bottom: 5px; }
    .dual-bar-safe { height: 100%; background: linear-gradient(90deg, #27ae60, #52c788); border-radius: 6px 0 0 6px; }
    .dual-bar-risk { height: 100%; background: #e8ae6a; }

    .outcome-words { font-size: 11px; color: #8aabb8; }

    .no-results { font-size: 14px; color: #8aabb8; text-align: center; padding: 2rem 0; }
    .disclaimer { font-size: 11px; color: #b0c4d0; margin-top: 16px; line-height: 1.6; border-top: 1px solid #eaf1f8; padding-top: 12px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Simply Healthcare</h1>
    <p>Healthcare made easy so you don't have to worry.</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input id="search" type="text" placeholder="Search a procedure, e.g. knee, heart, appendix..." autocomplete="off" />
  </div>
  <div class="result-count" id="count"></div>
  <div id="results"></div>
</div>

<script>
var procedures = [
  {
    name: "Appendectomy",
    tags: ["appendix","appendectomy","stomach","abdominal"],
    plain: "Removal of the appendix — a small pouch attached to the large intestine. Usually done as an emergency when the appendix becomes infected and swollen.",
    what: "A surgeon makes a few small cuts in your abdomen and removes the appendix using a tiny camera — this is called laparoscopic surgery. The small cuts mean less pain, less scarring, and a faster return to normal life compared to older open surgery methods.",
    recovery: "1–3 weeks. Most patients go home the next day and are back to light activity within a week.",
    why: "A swollen appendix can burst and cause a life-threatening infection. Removing it quickly is the safest and most effective option.",
    reassure: "This is one of the most commonly performed surgeries in the world. Surgical teams carry it out routinely, and the vast majority of patients recover fully without complications.",
    safeCount: 97,
    riskFactors: [
      { label: "No complications", pct: 97 },
      { label: "Wound infection", pct: 3 },
      { label: "Internal bleeding", pct: 1 },
      { label: "Injury to nearby organs", pct: 0.3 }
    ]
  },
  {
    name: "Knee replacement",
    tags: ["knee","replacement","joint","arthroplasty"],
    plain: "The damaged surfaces of your knee joint are replaced with metal and plastic parts so your knee can move without pain.",
    what: "A surgeon removes worn-out cartilage and bone from the knee and replaces it with carefully shaped artificial components that mimic the natural movement of your joint. Both sides of the knee are resurfaced.",
    recovery: "Most patients walk with assistance within a day or two of surgery. You will work with a physiotherapist to rebuild strength. Most people return to everyday activities within 6–12 weeks, with continued improvement for up to a year.",
    why: "Recommended when knee pain from arthritis is severe enough to affect sleep, walking, or daily life, and other treatments such as medication and physiotherapy have not provided enough relief.",
    reassure: "Knee replacement has a very high success rate. The majority of patients report significantly less pain and better mobility within a few months, with most artificial joints lasting 15–20 years.",
    safeCount: 90,
    riskFactors: [
      { label: "Good outcome, improved mobility", pct: 90 },
      { label: "Stiffness needing further treatment", pct: 4 },
      { label: "Implant loosening within 10 years", pct: 5 },
      { label: "Blood clots in leg (DVT)", pct: 2 },
      { label: "Infection", pct: 1 }
    ]
  },
  {
    name: "Gallbladder removal (cholecystectomy)",
    tags: ["gallbladder","cholecystectomy","gallstones"],
    plain: "Removal of the gallbladder — a small organ under your liver that stores bile. Done when gallstones cause repeated pain or blockages.",
    what: "Using small incisions and a tiny camera, the surgeon carefully detaches and removes the gallbladder. You can live completely normally without it — bile flows directly from your liver to your intestine and digestion carries on as usual.",
    recovery: "Most patients go home the same day or the next morning. You can return to light activity within 1–2 weeks.",
    why: "Gallstones can block bile ducts, trigger episodes of intense pain, and cause serious infections like cholecystitis or pancreatitis if not treated.",
    reassure: "Gallbladder removal is among the safest and most routine operations performed today. Most patients feel significant relief from pain immediately after recovery and go on to live without any dietary restrictions.",
    safeCount: 97,
    riskFactors: [
      { label: "Full recovery, no issues", pct: 97 },
      { label: "Digestive changes (loose stools)", pct: 3 },
      { label: "Wound infection", pct: 2 },
      { label: "Bleeding", pct: 1 },
      { label: "Bile duct injury", pct: 0.5 }
    ]
  },
  {
    name: "Coronary artery bypass (CABG)",
    tags: ["heart","bypass","cabg","coronary","cardiac"],
    plain: "A healthy blood vessel taken from elsewhere in your body is used to create a bypass route around a blocked heart artery, restoring blood flow to your heart muscle.",
    what: "The chest is opened and a vein or artery — often from your leg or chest wall — is stitched above and below the blockage to redirect blood flow around it. During surgery, a heart-lung machine temporarily takes over the work of your heart so the surgeon can work safely.",
    recovery: "You will typically spend 4–7 days in hospital. Most patients return to light daily activities within 4–6 weeks and feel meaningfully better within 3 months. Full recovery takes around 3–6 months with cardiac rehabilitation support.",
    why: "This surgery is recommended when arteries supplying the heart are severely narrowed and cannot be treated adequately with stents or medication alone. It significantly reduces the risk of heart attack and relieves chest pain.",
    reassure: "While this is a major surgery, it is performed by highly specialized cardiac surgical teams thousands of times each year. Most patients experience a dramatic improvement in quality of life afterward — many describing it as life-changing. The surgery is carefully planned with your full team to minimize your individual risk.",
    safeCount: 75,
    riskFactors: [
      { label: "Successful outcome, improved heart function", pct: 75 },
      { label: "Temporary irregular heartbeat (usually resolves)", pct: 20 },
      { label: "Temporary memory or thinking changes", pct: 15 },
      { label: "Kidney problems", pct: 5 },
      { label: "Wound infection", pct: 3 },
      { label: "Stroke", pct: 2 }
    ]
  },
  {
    name: "Hip replacement",
    tags: ["hip","replacement","joint","arthroplasty"],
    plain: "The damaged ball-and-socket hip joint is replaced with artificial parts so you can move without pain.",
    what: "The surgeon removes the worn femoral head (the ball at the top of your thigh bone) and the damaged socket, replacing both with smooth metal, ceramic, or plastic implants designed to replicate the natural gliding motion of your hip.",
    recovery: "Most patients are up and walking with a frame within 24 hours of surgery. You can usually return home within 3–5 days. Most people resume normal daily activities within 6 weeks, with full recovery over 3–6 months.",
    why: "Recommended when hip arthritis or injury has made everyday movement — walking, climbing stairs, or getting dressed — consistently painful and other treatments no longer provide relief.",
    reassure: "Hip replacement is one of the most successful operations in medicine. Patient satisfaction rates are consistently high, and most people experience a level of pain-free movement they haven't had in years. Modern implants are designed to last 20 years or more.",
    safeCount: 90,
    riskFactors: [
      { label: "Successful recovery, reduced pain", pct: 90 },
      { label: "Leg length difference (usually minor)", pct: 5 },
      { label: "Joint dislocation", pct: 3 },
      { label: "Blood clots", pct: 2 },
      { label: "Infection", pct: 1 }
    ]
  },
  {
    name: "Cataract surgery",
    tags: ["eye","cataract","vision","lens"],
    plain: "The cloudy lens inside your eye is removed and replaced with a clear artificial lens to restore your vision.",
    what: "A tiny ultrasound probe breaks up the cloudy lens, which is then gently removed through a small opening smaller than 3mm. A new clear lens is folded and placed inside — no stitches are needed. The whole procedure takes around 15 minutes and you are awake throughout, though drops numb the eye completely.",
    recovery: "Most people notice clearer vision within 24–48 hours. You use eye drops for a few weeks and avoid rubbing the eye. Full healing takes around 4–6 weeks.",
    why: "Cataracts slowly cloud the natural lens, making vision blurry, dull, or yellowed. Surgery is the only way to restore clear sight, and the improvement is usually immediate and dramatic.",
    reassure: "Cataract surgery is the most commonly performed elective surgery in the world and has an exceptional safety record. The vast majority of patients are delighted with their improved vision and describe the procedure as straightforward and painless.",
    safeCount: 98,
    riskFactors: [
      { label: "Clear vision restored successfully", pct: 98 },
      { label: "Posterior clouding needing laser (quick fix)", pct: 10 },
      { label: "Swelling of central vision area", pct: 1 },
      { label: "Retinal detachment", pct: 0.5 },
      { label: "Serious infection", pct: 0.1 }
    ]
  },
  {
    name: "Hysterectomy",
    tags: ["uterus","hysterectomy","gynecology","womb"],
    plain: "Surgical removal of the uterus. Depending on the reason for surgery, the ovaries and fallopian tubes may also be removed.",
    what: "Can be carried out through a small abdominal incision, vaginally, or using keyhole surgery — your surgeon will recommend the most suitable approach based on your individual situation. After surgery you will no longer have periods or be able to become pregnant, which is an important consideration discussed fully before proceeding.",
    recovery: "Most women return to light daily activities within 4–6 weeks. Full recovery takes 6–8 weeks. Your medical team will support you through any hormonal changes if the ovaries are also removed.",
    why: "Performed to treat conditions such as fibroids, endometriosis, uterine prolapse, cancer, or persistent pelvic pain that has not improved with other treatments.",
    reassure: "For most women, a hysterectomy brings significant and lasting relief from pain and discomfort that may have affected their daily life for years. Surgical teams are experienced in providing both physical and emotional support throughout this process.",
    safeCount: 93,
    riskFactors: [
      { label: "Successful outcome, symptom relief", pct: 93 },
      { label: "Infection", pct: 3 },
      { label: "Heavy bleeding needing transfusion", pct: 2 },
      { label: "Blood clots", pct: 1 },
      { label: "Bladder or ureter injury", pct: 1 }
    ]
  },
  {
    name: "Hernia repair",
    tags: ["hernia","groin","abdominal","inguinal"],
    plain: "Tissue that has pushed through a weak spot in the abdominal wall is guided back into place, and the weakened area is reinforced — usually with a small surgical mesh patch.",
    what: "Through small incisions, the surgeon carefully positions the protruding tissue back where it belongs, then places a lightweight mesh over the weakened area. The mesh becomes integrated with your body over time, providing lasting support that significantly reduces the chance of the hernia returning.",
    recovery: "Most patients go home the same day. Light activity is possible within 1–2 weeks, and most people return to normal life within 3 weeks. Heavy lifting is restricted for about 6 weeks while the mesh settles.",
    why: "Left untreated, hernias can worsen over time and become dangerous if the trapped tissue loses its blood supply — an emergency called strangulation. Surgery resolves the problem permanently.",
    reassure: "Hernia repair is a common, well-practiced procedure. Most patients are pleasantly surprised by how quick and straightforward the recovery is. Modern mesh techniques have made recurrence rare.",
    safeCount: 95,
    riskFactors: [
      { label: "Full recovery, hernia resolved", pct: 95 },
      { label: "Chronic pain at surgery site", pct: 8 },
      { label: "Hernia coming back", pct: 5 },
      { label: "Wound infection", pct: 2 },
      { label: "Nerve discomfort", pct: 1 }
    ]
  },
  {
    name: "Spinal fusion",
    tags: ["spine","back","spinal","fusion","vertebrae"],
    plain: "Two or more vertebrae (the bones of your spine) are permanently joined together to stop painful movement between them and stabilize the area.",
    what: "Bone graft material — either from your own body or a donor — is placed between the targeted vertebrae. Metal rods, screws, or small plates hold everything in the correct position while the bones slowly grow together, forming one solid, stable structure over several months.",
    recovery: "You will be helped to walk within a day or two of surgery. Most patients return to light daily activities within 4–6 weeks. Heavier activity resumes at 3–6 months as the fusion solidifies. Your team will support you with a tailored physiotherapy programme.",
    why: "Recommended when spinal instability, degenerative disc disease, scoliosis, or a fracture is compressing nerves or causing severe pain that has not responded to non-surgical treatments.",
    reassure: "While spinal fusion is a significant procedure, it is performed by specialist surgeons with extensive training. For patients who are suitable candidates, it often brings meaningful and long-lasting relief from pain that has significantly limited their life. Your surgical team will have thoroughly assessed that this is the right option for you.",
    safeCount: 80,
    riskFactors: [
      { label: "Meaningful pain relief, improved stability", pct: 80 },
      { label: "Adjacent spinal segment changes over time", pct: 15 },
      { label: "Incomplete bone fusion", pct: 5 },
      { label: "Infection", pct: 4 },
      { label: "Nerve discomfort", pct: 3 }
    ]
  },
  {
    name: "Tonsillectomy",
    tags: ["tonsils","tonsillectomy","throat","pediatric"],
    plain: "Surgical removal of the tonsils — two small glands at the back of the throat — usually because of repeated infections or breathing difficulties during sleep.",
    what: "The surgeon removes both tonsils through the mouth using a small cutting instrument. The procedure is performed under general anesthesia and typically takes 30–45 minutes. It is a very common procedure for both children and adults.",
    recovery: "The throat will feel sore for 7–14 days. Cold fluids, soft foods, and rest are important. Pain is manageable with standard pain relief, and most children bounce back within 2 weeks.",
    why: "Recommended when throat infections occur very frequently — typically 7 or more times a year — or when enlarged tonsils cause snoring, interrupted sleep, or breathing difficulties.",
    reassure: "Tonsillectomy is a routine procedure that has helped millions of children and adults live free from recurring throat infections. Most families find that recovery, while a little uncomfortable, goes smoothly and that the long-term benefits far outweigh the short recovery period.",
    safeCount: 97,
    riskFactors: [
      { label: "Smooth recovery, no complications", pct: 97 },
      { label: "Post-operative bleeding (usually minor)", pct: 3 },
      { label: "Dehydration from not drinking enough", pct: 2 },
      { label: "Infection", pct: 2 },
      { label: "Anesthesia reaction", pct: 0.5 }
    ]
  }
];

function safeColor() { return '#2e86c1'; }
function affectedColor() { return '#e8ae6a'; }

function inWords(pct, isPositive) {
  if (isPositive) {
    if (pct >= 98) return 'Nearly all patients — ' + pct + ' out of every 100';
    if (pct >= 90) return 'The large majority — about ' + pct + ' out of every 100 patients';
    return 'About ' + pct + ' out of every 100 patients';
  }
  if (pct < 0.5) return 'Very rare — fewer than 1 in 200 patients';
  if (pct < 1)   return 'Uncommon — fewer than 1 in 100 patients';
  if (pct < 2)   return 'About 1 in every 100 patients';
  return 'About ' + Math.round(pct) + ' in every 100 patients';
}

function buildIconGrid(safeCount) {
  var html = '<div class="icon-grid">';
  for (var i = 0; i < 100; i++) {
    if (i < safeCount) {
      html += '<div class="icon-person safe"></div>';
    } else {
      html += '<div class="icon-person affected"></div>';
    }
  }
  return html + '</div>' +
    '<div class="icon-legend">' +
      '<div class="icon-legend-item"><div class="icon-legend-box" style="background:#2e86c1"></div>' + safeCount + ' out of 100 patients have a successful outcome</div>' +
      '<div class="icon-legend-item"><div class="icon-legend-box" style="background:#e8ae6a"></div>' + (100 - safeCount) + ' out of 100 may experience a complication</div>' +
    '</div>';
}

function buildDualBars(riskFactors) {
  return riskFactors.map(function(f) {
    var isPositive = f.pct >= 50;
    var safeW = Math.min(f.pct, 100).toFixed(1);
    var riskW = Math.min(100 - f.pct, 100).toFixed(1);
    if (isPositive) {
      return '<div class="outcome-item">' +
        '<div class="outcome-item-top">' +
          '<span class="outcome-item-label">' + f.label + '</span>' +
          '<div class="outcome-pct-wrap"><span class="outcome-pct-safe">' + f.pct + '%</span></div>' +
        '</div>' +
        '<div class="dual-bar-track">' +
          '<div class="dual-bar-safe" style="width:' + safeW + '%"></div>' +
          '<div class="dual-bar-risk" style="width:' + riskW + '%"></div>' +
        '</div>' +
        '<div class="outcome-words">' + inWords(f.pct, true) + '</div>' +
      '</div>';
    } else {
      var c = f.pct < 2 ? '#4caf7d' : f.pct <= 10 ? '#e8ae6a' : '#e07050';
      return '<div class="outcome-item">' +
        '<div class="outcome-item-top">' +
          '<span class="outcome-item-label">' + f.label + '</span>' +
          '<span class="outcome-pct-risk" style="color:' + c + ';font-size:13px;font-weight:700">' + f.pct + '%</span>' +
        '</div>' +
        '<div class="dual-bar-track">' +
          '<div class="dual-bar-safe" style="width:' + Math.min((f.pct / 25) * 100, 100).toFixed(1) + '%;background:' + c + '"></div>' +
        '</div>' +
        '<div class="outcome-words">' + inWords(f.pct, false) + '</div>' +
      '</div>';
    }
  }).join('');
}

function buildCard(p, i) {
  return '<div class="card" onclick="toggle(' + i + ')">' +
    '<div class="card-name">' + p.name + '</div>' +
    '<div class="card-plain">' + p.plain + '</div>' +
    '<div class="expand-hint">Tap to learn more and see your outcome data &#8595;</div>' +
    '<div class="card-detail" id="detail-' + i + '">' +
      '<div class="reassure-band"><p>' + p.reassure + '</p></div>' +
      '<div class="detail-row"><span class="detail-label">What happens</span><span class="detail-val">' + p.what + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Recovery</span><span class="detail-val">' + p.recovery + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Why it\'s done</span><span class="detail-val">' + p.why + '</span></div>' +
      '<div class="risk-section">' +
        '<div class="risk-section-title">What the numbers actually say</div>' +
        '<div class="risk-section-sub">Real world outcomes.</div>' +
        '<div class="icon-block">' +
          '<div class="icon-block-label">Picture 100 patients having this procedure. Here is what typically happens:</div>' +
          buildIconGrid(p.safeCount) +
        '</div>' +
        '<div class="outcome-title">Breakdown by outcome</div>' +
        '<div class="outcome-bars">' + buildDualBars(p.riskFactors) + '</div>' +
        '<div class="disclaimer">These figures are approximate population averages based on published medical research. Your personal outcome will depend on your age, overall health, and the specific details of your case. Your surgical team is the best source of guidance for your individual situation.</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggle(i) {
  document.getElementById('detail-' + i).classList.toggle('open');
}

var search = document.getElementById('search');
var results = document.getElementById('results');
var countEl = document.getElementById('count');

function render(list) {
  countEl.textContent = list.length > 0 ? list.length + ' result' + (list.length !== 1 ? 's' : '') : '';
  if (list.length === 0) {
    results.innerHTML = '<div class="no-results">No procedures found. Try a different search term.</div>';
    return;
  }
  results.innerHTML = list.map(function(p, i) { return buildCard(p, i); }).join('');
}

search.addEventListener('input', function() {
  var q = search.value.toLowerCase().trim();
  if (!q) { render(procedures); return; }
  var filtered = procedures.filter(function(p) {
    return p.name.toLowerCase().includes(q) ||
      p.tags.some(function(t) { return t.includes(q); }) ||
      p.plain.toLowerCase().includes(q);
  });
  render(filtered);
});

render(procedures);
</script>
</body>
</html>
